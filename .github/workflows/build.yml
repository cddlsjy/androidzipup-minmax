name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        id: setup-java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set JAVA_HOME globally
        run: echo "JAVA_HOME=${{ steps.setup-java.outputs.path }}" >> $GITHUB_ENV

      - name: Verify Java
        run: |
          echo "JAVA_HOME: $JAVA_HOME"
          java -version

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Remove hardcoded Java home in gradle.properties
        run: |
          if [ -f gradle.properties ]; then
            sed -i '/org.gradle.java.home/d' gradle.properties
            echo "✅ Removed org.gradle.java.home from gradle.properties"
          else
            echo "ℹ️ No gradle.properties file found, skipping."
          fi

      
      # ✅ 新增：确保 minSdkVersion >= 26，以支持自适应图标
      - name: Ensure minSdkVersion >= 26 for adaptive-icon
        run: |
          if [ -f app/build.gradle.kts ]; then
            sed -i 's/minSdkVersion = [0-9]\+/minSdkVersion = 26/g' app/build.gradle.kts
            sed -i 's/minSdk = [0-9]\+/minSdk = 26/g' app/build.gradle.kts
            echo "✅ Updated minSdkVersion to 26 in app/build.gradle.kts"
          elif [ -f app/build.gradle ]; then
            sed -i 's/minSdkVersion [0-9]\+/minSdkVersion 26/g' app/build.gradle
            echo "✅ Updated minSdkVersion to 26 in app/build.gradle"
          else
            echo "⚠️ No build.gradle file found, skipping minSdk update."
          fi
      
      
      
      - name: Build APK
        run: gradle assembleDebug --stacktrace --no-daemon

      - name: Find and upload APK
        id: find_apk
        run: |
          APK_PATH=$(find . -name "*.apk" -type f | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "❌ No APK found"
            find . -path "*/build/outputs/*" -type f | head -20
            exit 1
          fi
          echo "✅ Found APK: $APK_PATH"
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 7
